<svg width="760" height="90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .name {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 38px;
        font-weight: 700;
        fill: #111827;
        animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
        opacity: 0;
      }
      .sub {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        fill: #6B7280;
        animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.25s forwards;
        opacity: 0;
        letter-spacing: 0.03em;
      }
      .accent {
        fill: #2563EB;
        animation: pulse 2.5s ease-in-out infinite, slideUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
        opacity: 0;
      }
      .line {
        stroke: #E5E7EB;
        stroke-width: 1;
        animation: grow 0.6s ease 0.5s forwards;
        transform-origin: left center;
        transform: scaleX(0);
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { r: 5; opacity: 1; }
        50%       { r: 7; opacity: 0.5; }
      }
      @keyframes grow {
        to { transform: scaleX(1); }
      }
    </style>
  </defs>
  <circle class="accent" cx="30" cy="40" r="5"/>
  <text class="name" x="50" y="52">Eloi Shema</text>
  <text class="sub" x="50" y="74">FULL-STACK DEVELOPER  ·  KIGALI, RWANDA  ·  OPEN TO REMOTE ROLES</text>
  <line class="line" x1="50" y1="85" x2="720" y2="85"/>
</svg>
