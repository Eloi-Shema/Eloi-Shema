<svg width="760" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* bg rect adapts to system theme */
      .bg {
        fill: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0d1117; }
      }

      /* text colors */
      .name {
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        font-size: 46px;
        font-weight: 700;
        fill: #111827;
      }
       .sub {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        fill: #6B7280;
        letter-spacing: 0.08em;
      }
      .cursor {
        fill: #2dba4e;
        animation: blink 1s step-end infinite;
        animation-delay: 1.6s;
        opacity: 0;
      }
      @media (prefers-color-scheme: dark) {
        .name { fill: #F9FAFB; }
        .sub  { fill: #9CA3AF; }
      }

      /* typewriter mask — color must match bg */
      .mask-name {
        fill: #ffffff;
        animation: slideRight 1.1s steps(22, end) 0.2s forwards;
      }
      .mask-sub {
        fill: #ffffff;
        animation: slideRight 1.2s steps(38, end) 1.3s forwards;
      }
      @media (prefers-color-scheme: dark) {
        .mask-name { fill: #0d1117; }
        .mask-sub  { fill: #0d1117; }
      }

      /* accent dot */
      .dot {
        fill: #2dba4e;
        animation: fadeIn 0.3s ease 0.1s forwards;
        opacity: 0;
      }

      /* underline */
      .line {
        stroke: #E5E7EB;
        stroke-width: 1;
        animation: grow 0.5s ease 2.5s forwards;
        transform-origin: left center;
        transform: scaleX(0);
      }
      @media (prefers-color-scheme: dark) {
        .line { stroke: #30363d; }
      }

      @keyframes slideRight {
        from { transform: translateX(0); }
        to   { transform: translateX(760px); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      @keyframes grow {
        to { transform: scaleX(1); }
      }
    </style>
  </defs>

  <!-- bg -->
  <rect class="bg" width="760" height="100"/>

  <!-- accent dot -->
  <circle class="dot" cx="28" cy="42" r="5"/>

  <!-- name text + mask -->
  <text class="name" x="48" y="54">Eloi Shema</text>
  <rect class="mask-name" x="48" y="18" width="340" height="46"/>

  <!-- subtitle text + mask -->
  <text class="sub" x="48" y="76">FULL-STACK DEVELOPER  ·  OPEN TO REMOTE ROLES</text>
  <rect class="mask-sub" x="48" y="60" width="400" height="24"/>
</svg>
